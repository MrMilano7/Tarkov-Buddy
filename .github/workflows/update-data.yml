# Nightly game-data refresh. Runs the importer against tarkov.dev and
# commits the result — visitors to the hosted app always get current data
# and nobody ever has to run Python by hand.
name: Update game data
on:
  schedule:
    - cron: "17 4 * * *"   # daily, 04:17 UTC (offset avoids top-of-hour API load)
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run importer
        run: python tools/update_data.py
      - name: Commit if changed
        run: |
          rm -rf data/backup
          git config user.name "data-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet && echo "No data changes." && exit 0
          git commit -m "data: nightly refresh from tarkov.dev"
          git push
